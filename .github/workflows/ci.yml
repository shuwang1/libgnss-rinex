name: CI
env:
  MACOSX_DEPLOYMENT_TARGET: "15.4"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build and Test (Swift 6.0)
    runs-on: macos-latest
   
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: "6.3"
         

      - name: Build
        run: swift build -v

      - name: Run Tests
        run: swift test -v --enable-code-coverage
      # 2. Convert Swift's internal LLVM coverage data into standard lcov format
      - name: Convert Coverage to LCOV
        uses: maxep/spm-lcov-action@0.3.0
        with:
          output-file: ./coverage/lcov.info
